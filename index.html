<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monobooth | Pro Layout</title>
    <style>
        :root {
            --primary: #d4a373;
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 2.2rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 800; }
        .header h1 span { color: var(--primary); font-weight: 200; }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--surface);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass);
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #777;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: #000;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        .camera-container {
            flex: 1;
            position: relative;
            background: var(--surface);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--glass);
        }

        video {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 12px;
            transform: scaleX(-1);
            background: #000;
        }

        .result-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #strip-preview {
            max-width: 320px;
            background: white;
            padding: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: 900;
            z-index: 10;
            pointer-events: none;
        }

        .status-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--primary);
            color: black;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            z-index: 11;
            display: none;
        }

        .filter-group { display: flex; gap: 8px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .btn-filter {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
        }
        .btn-filter.active { background: white; color: black; }

        .action-area { margin-top: 30px; display: flex; gap: 15px; }
        .btn-main {
            padding: 16px 40px; border-radius: 50px; border: none;
            cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-capture { background: var(--primary); color: #000; }
        .btn-retake { background: #333; color: white; display: none; }
        .btn-download { background: white; color: black; display: none; }

        @media (max-width: 850px) { .main-wrapper { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>

<div class="header">
    <h1>MONO<span>BOOTH</span></h1>
</div>

<div class="mode-selector">
    <button class="mode-btn active" onclick="changeMode(4, this)">4 PHOTOS (STRIP)</button>
    <button class="mode-btn" onclick="changeMode(8, this)">8 PHOTOS (GRID 2x4)</button>
</div>

<div class="main-wrapper">
    <div class="camera-container">
        <div id="countdown"></div>
        <div class="status-badge" id="status">PHOTO 1</div>
        <video id="video" autoplay playsinline></video>
        
        <div class="filter-group">
            <button class="btn-filter active" onclick="setFilter('none', this)">RAW</button>
            <button class="btn-filter" onclick="setFilter('grayscale(100%) contrast(1.2)', this)">MONO</button>
            <button class="btn-filter" onclick="setFilter('sepia(0.7) contrast(1.1)', this)">RETRO</button>
            <button class="btn-filter" onclick="setFilter('brightness(1.2) saturate(1.1)', this)">GLOW</button>
        </div>
    </div>

    <div class="result-container" id="result-area">
        <img id="strip-preview">
        <canvas id="render-canvas" style="display:none;"></canvas>
    </div>
</div>

<div class="action-area">
    <button class="btn-main btn-capture" id="start-btn">Start Session</button>
    <button class="btn-main btn-retake" id="retake-btn">Retake</button>
    <button class="btn-main btn-download" id="download-btn">Download</button>
</div>

<script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const downloadBtn = document.getElementById('download-btn');
    const countdownEl = document.getElementById('countdown');
    const statusEl = document.getElementById('status');
    const resultArea = document.getElementById('result-area');
    const previewImg = document.getElementById('strip-preview');
    const canvas = document.getElementById('render-canvas');

    let photos = [];
    let currentMode = 4;
    let currentFilter = 'none';

    navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);

    function changeMode(val, btn) {
        currentMode = val;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setFilter(f, btn) {
        currentFilter = f;
        video.style.filter = f;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    startBtn.addEventListener('click', async () => {
        photos = [];
        startBtn.disabled = true;
        resultArea.style.display = 'none';
        retakeBtn.style.display = 'none';
        downloadBtn.style.display = 'none';

        for (let i = 1; i <= currentMode; i++) {
            statusEl.style.display = 'block';
            statusEl.innerText = `PHOTO ${i} / ${currentMode}`;
            await runTimer(3);
            takeSnap();
            // Flash effect
            document.body.style.background = "white";
            setTimeout(() => document.body.style.background = "#0f0f0f", 50);
        }

        renderOutput();
        startBtn.disabled = false;
        retakeBtn.style.display = 'inline-block';
        downloadBtn.style.display = 'inline-block';
        statusEl.style.display = 'none';
    });

    function runTimer(s) {
        return new Promise(res => {
            let c = s;
            countdownEl.innerText = c;
            let t = setInterval(() => {
                c--;
                if(c<=0){ clearInterval(t); countdownEl.innerText=""; res(); }
                else countdownEl.innerText = c;
            }, 1000);
        });
    }

    function takeSnap() {
        const c = document.createElement('canvas');
        c.width = 800; c.height = 600;
        const ctx = c.getContext('2d');
        ctx.filter = currentFilter;
        ctx.translate(c.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, 800, 600);
        photos.push(c.toDataURL('image/jpeg', 0.9));
    }

    function renderOutput() {
        const p = 25; // Padding
        const imgW = 500;
        const imgH = 375;
        const ctx = canvas.getContext('2d');

        if (currentMode === 4) {
            canvas.width = imgW + (p * 2);
            canvas.height = (imgH * 4) + (p * 6) + 80;
        } else {
            // Mode 8: 2 Kolom, 4 Baris
            canvas.width = (imgW * 2) + (p * 3);
            canvas.height = (imgH * 4) + (p * 6) + 80;
        }

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let loaded = 0;
        photos.forEach((src, i) => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                let x, y;
                if (currentMode === 4) {
                    x = p;
                    y = p + (i * (imgH + p));
                } else {
                    // Grid 2x4 logic
                    const col = i % 2;
                    const row = Math.floor(i / 2);
                    x = p + (col * (imgW + p));
                    y = p + (row * (imgH + p));
                }
                ctx.drawImage(img, x, y, imgW, imgH);
                loaded++;
                if(loaded === currentMode) {
                    ctx.fillStyle = "#222";
                    ctx.font = "bold 30px Inter";
                    ctx.textAlign = "center";
                    ctx.fillText("M O N O B O O T H", canvas.width/2, canvas.height - 40);
                    previewImg.src = canvas.toDataURL();
                    resultArea.style.display = 'flex';
                }
            };
        });
    }

    retakeBtn.addEventListener('click', () => startBtn.click());
    downloadBtn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.download = `Monobooth-${Date.now()}.png`;
        a.href = previewImg.src;
        a.click();
    });
</script>
</body>
</html>
