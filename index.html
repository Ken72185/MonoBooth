<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Strip Photobooth</title>
    <style>
        :root {
            --primary: #d4a373;
            --dark: #121212;
            --light: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: #1a1a1a;
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { letter-spacing: 5px; text-transform: uppercase; font-weight: 300; }

        /* Main Booth Area */
        .main-container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        /* Camera Section */
        .camera-section {
            flex: 1;
            position: relative;
            background: var(--glass);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        video {
            width: 100%;
            border-radius: 10px;
            transform: scaleX(-1);
            background: #000;
        }

        /* Result Section (The Strip) */
        .result-section {
            display: none; /* Muncul setelah foto selesai */
            width: 250px;
            background: white; /* Warna kertas foto klasik */
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }

        #final-strip-container img {
            width: 100%;
            display: block;
        }

        /* UI Overlays */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: 800;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }

        /* Controls */
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-retake { background: #444; color: white; }
        .btn-download { background: #2a9d8f; color: white; }
        button:disabled { background: #666; cursor: not-allowed; }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; align-items: center; }
            .result-section { width: 200px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Lumina Strip</h1>
    <p>4 Poses, 1 Memory</p>
</div>

<div class="main-container">
    <div class="camera-section" id="cam-area">
        <div id="countdown"></div>
        <div class="status-badge" id="status">PHOTO 1 / 4</div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="result-section" id="result-area">
        <div id="final-strip-container">
            <canvas id="main-canvas" style="display:none;"></canvas>
            <img id="strip-preview" alt="Your Strip">
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn-start" id="start-btn">Start Session</button>
    <button class="btn-retake" id="retake-btn" style="display:none;">Retake All</button>
    <button class="btn-download" id="download-btn" style="display:none;">Download Strip</button>
</div>

<script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const downloadBtn = document.getElementById('download-btn');
    const countdownEl = document.getElementById('countdown');
    const statusEl = document.getElementById('status');
    const resultArea = document.getElementById('result-area');
    const stripPreview = document.getElementById('strip-preview');
    const mainCanvas = document.getElementById('main-canvas');

    let capturedImages = [];
    const maxPhotos = 4;

    // Setup Kamera
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
        } catch (e) {
            alert("Kamera tidak diizinkan atau tidak ditemukan.");
        }
    }

    // Fungsi Utama: Mulai Sesi Foto
    startBtn.addEventListener('click', async () => {
        capturedImages = [];
        startBtn.disabled = true;
        resultArea.style.display = 'none';
        retakeBtn.style.display = 'none';
        downloadBtn.style.display = 'none';
        
        for (let i = 1; i <= maxPhotos; i++) {
            statusEl.style.display = 'block';
            statusEl.innerText = `PHOTO ${i} / ${maxPhotos}`;
            
            await runCountdown(3); // Hitung mundur 3 detik tiap foto
            takeSnapshot();
            
            // Efek Flash
            document.body.style.backgroundColor = "white";
            setTimeout(() => document.body.style.backgroundColor = "#1a1a1a", 100);
        }

        renderStrip();
        finishSession();
    });

    // Countdown Promise
    function runCountdown(seconds) {
        return new Promise((resolve) => {
            let count = seconds;
            countdownEl.innerText = count;
            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    countdownEl.innerText = "";
                    resolve();
                } else {
                    countdownEl.innerText = count;
                }
            }, 1000);
        });
    }

    // Ambil Gambar
    function takeSnapshot() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 640;
        tempCanvas.height = 480;
        const ctx = tempCanvas.getContext('2d');
        
        // Mirroring & Drawing
        ctx.translate(tempCanvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        
        capturedImages.push(tempCanvas.toDataURL('image/jpeg', 0.8));
    }

    // Menggabungkan 4 foto menjadi 1 Strip
    function renderStrip() {
        const padding = 20;
        const imgW = 400;
        const imgH = 300;
        const stripW = imgW + (padding * 2);
        const stripH = (imgH * maxPhotos) + (padding * (maxPhotos + 2)) + 60; // Extra space for logo/text

        mainCanvas.width = stripW;
        mainCanvas.height = stripH;
        const ctx = mainCanvas.getContext('2d');

        // Background Kertas (Putih)
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, stripW, stripH);

        // Gambar setiap foto ke canvas
        capturedImages.forEach((dataUrl, index) => {
            const img = new Image();
            img.src = dataUrl;
            img.onload = () => {
                const yPos = padding + (index * (imgH + padding));
                ctx.drawImage(img, padding, yPos, imgW, imgH);
                
                // Jika sudah foto terakhir, tampilkan preview
                if (index === maxPhotos - 1) {
                    // Tambah Teks Branding di bawah
                    ctx.fillStyle = "#333";
                    ctx.font = "italic 20px Inter";
                    ctx.textAlign = "center";
                    ctx.fillText("LUMINA STRIP", stripW/2, stripH - 40);
                    ctx.font = "12px Inter";
                    ctx.fillText(new Date().toLocaleDateString(), stripW/2, stripH - 20);

                    stripPreview.src = mainCanvas.toDataURL('image/png');
                    resultArea.style.display = 'block';
                }
            };
        });
    }

    function finishSession() {
        startBtn.disabled = false;
        statusEl.style.display = 'none';
        retakeBtn.style.display = 'inline-block';
        downloadBtn.style.display = 'inline-block';
    }

    retakeBtn.addEventListener('click', () => startBtn.click());

    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `LuminaStrip-${Date.now()}.png`;
        link.href = stripPreview.src;
        link.click();
    });

    init();
</script>

</body>
</html>
