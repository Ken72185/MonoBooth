<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monobooth | Online Photobooth</title>
    <style>
        :root {
            --primary: #d4a373; /* Gold accent */
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Header & Logo */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 2.5rem; 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            font-weight: 800;
        }
        .header h1 span { font-weight: 200; color: var(--primary); }
        .header p { opacity: 0.6; letter-spacing: 2px; font-size: 0.9rem; margin-top: 5px; }

        /* Layout Main */
        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        /* Left: Camera Section */
        .camera-container {
            flex: 1;
            position: relative;
            background: var(--surface);
            padding: 15px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 16px;
            transform: scaleX(-1); /* Mirror */
            background: #000;
            transition: filter 0.3s ease;
        }

        /* Right: Result Section */
        .result-container {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease;
        }

        #strip-preview {
            width: 280px; /* Lebar strip estetik */
            background: white;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* UI Overlays */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }

        .status-badge {
            position: absolute;
            top: 30px;
            left: 30px;
            background: var(--primary);
            color: black;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            display: none;
            z-index: 11;
        }

        /* Filter Controls */
        .filter-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-filter {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-filter.active {
            background: white;
            color: black;
            font-weight: bold;
        }

        /* Bottom Controls */
        .action-area {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .btn-main {
            padding: 18px 45px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-capture { background: var(--primary); color: #000; }
        .btn-capture:hover { transform: scale(1.05); background: #e5b485; }

        .btn-retake { background: #333; color: white; display: none; }
        .btn-download { background: white; color: black; display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .camera-container { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>MONO<span>BOOTH</span></h1>
    <p>PURE &bull; TIMELESS &bull; MEMORY</p>
</div>

<div class="main-wrapper">
    <div class="camera-container">
        <div id="countdown"></div>
        <div class="status-badge" id="status">POSING 1 / 4</div>
        <video id="video" autoplay playsinline></video>
        
        <div class="filter-group" id="filters">
            <button class="btn-filter active" onclick="applyFilter('none', this)">RAW</button>
            <button class="btn-filter" onclick="applyFilter('grayscale(100%) contrast(1.1)', this)">MONO</button>
            <button class="btn-filter" onclick="applyFilter('sepia(0.6) contrast(1.1) brightness(0.9)', this)">NOSTALGIA</button>
            <button class="btn-filter" onclick="applyFilter('brightness(1.2) contrast(1.1) saturate(1.3)', this)">VIBRANT</button>
            <button class="btn-filter" onclick="applyFilter('blur(1px) brightness(1.1)', this)">SOFT</button>
        </div>
    </div>

    <div class="result-container" id="result-area">
        <img id="strip-preview" alt="Monobooth Strip">
        <canvas id="canvas-process" style="display:none;"></canvas>
    </div>
</div>

<div class="action-area">
    <button class="btn-main btn-capture" id="start-btn">Start Session</button>
    <button class="btn-main btn-retake" id="retake-btn">Retake</button>
    <button class="btn-main btn-download" id="download-btn">Save Memory</button>
</div>

<script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const downloadBtn = document.getElementById('download-btn');
    const countdownEl = document.getElementById('countdown');
    const statusEl = document.getElementById('status');
    const resultArea = document.getElementById('result-area');
    const stripPreview = document.getElementById('strip-preview');
    const canvasProcess = document.getElementById('canvas-process');
    const filterButtons = document.getElementById('filters');

    let capturedImages = [];
    let activeFilter = 'none';

    // 1. Hidupkan Kamera
    navigator.mediaDevices.getUserMedia({ 
        video: { width: 800, height: 600 }, 
        audio: false 
    }).then(stream => {
        video.srcObject = stream;
    }).catch(err => {
        alert("Kamera tidak dapat diakses. Pastikan izin kamera diberikan.");
    });

    // 2. Pilih Filter
    function applyFilter(filter, btn) {
        activeFilter = filter;
        video.style.filter = filter;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 3. Logika Sesi Foto
    startBtn.addEventListener('click', async () => {
        capturedImages = [];
        startBtn.disabled = true;
        startBtn.style.opacity = "0.5";
        filterButtons.style.pointerEvents = "none";
        resultArea.style.display = "none";
        retakeBtn.style.display = "none";
        downloadBtn.style.display = "none";

        for (let i = 1; i <= 4; i++) {
            statusEl.style.display = 'block';
            statusEl.innerText = `POSING ${i} / 4`;
            
            await handleCountdown(3);
            takePhoto();
            
            // Flash Effect
            document.body.style.backgroundColor = "white";
            setTimeout(() => document.body.style.backgroundColor = "#0f0f0f", 100);
        }

        renderFinalStrip();
        finishSession();
    });

    function handleCountdown(sec) {
        return new Promise(resolve => {
            let count = sec;
            countdownEl.innerText = count;
            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    countdownEl.innerText = "";
                    resolve();
                } else {
                    countdownEl.innerText = count;
                }
            }, 1000);
        });
    }

    function takePhoto() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 800;
        tempCanvas.height = 600;
        const ctx = tempCanvas.getContext('2d');
        
        // Mirroring + Filter
        ctx.filter = activeFilter;
        ctx.translate(tempCanvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, 800, 600);
        
        capturedImages.push(tempCanvas.toDataURL('image/jpeg', 0.9));
    }

    // 4. Render ke Double Strip (Gaya Photobooth Asli)
    function renderFinalStrip() {
        const p = 30; // Padding
        const imgW = 600;
        const imgH = 450;
        const stripW = imgW + (p * 2);
        const stripH = (imgH * 4) + (p * 6) + 120; // Extra space for branding

        // Kita buat double strip (dua kolom identik)
        canvasProcess.width = stripW * 2;
        canvasProcess.height = stripH;
        const ctx = canvasProcess.getContext('2d');

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvasProcess.width, canvasProcess.height);

        let loaded = 0;
        capturedImages.forEach((src, i) => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                const yPos = p + (i * (imgH + p));
                
                // Gambar ke sisi kiri
                ctx.drawImage(img, p, yPos, imgW, imgH);
                // Gambar ke sisi kanan (Double print)
                ctx.drawImage(img, p + stripW, yPos, imgW, imgH);
                
                loaded++;
                if (loaded === 4) {
                    drawBranding(ctx, stripW, stripH);
                    stripPreview.src = canvasProcess.toDataURL('image/png');
                    resultArea.style.display = "flex";
                }
            };
        });
    }

    function drawBranding(ctx, stripW, stripH) {
        ctx.fillStyle = "#1a1a1a";
        ctx.textAlign = "center";
        
        // Brand Kiri
        ctx.font = "bold 35px Inter";
        ctx.fillText("M O N O B O O T H", stripW / 2, stripH - 70);
        ctx.font = "20px Inter";
        ctx.fillText("PURE . TIMELESS . MEMORY", stripW / 2, stripH - 40);

        // Brand Kanan
        ctx.font = "bold 35px Inter";
        ctx.fillText("M O N O B O O T H", (stripW / 2) + stripW, stripH - 70);
        ctx.font = "20px Inter";
        ctx.fillText("PURE . TIMELESS . MEMORY", (stripW / 2) + stripW, stripH - 40);
        
        // Garis potong tengah
        ctx.setLineDash([10, 10]);
        ctx.strokeStyle = "#ccc";
        ctx.beginPath();
        ctx.moveTo(stripW, 0);
        ctx.lineTo(stripW, stripH);
        ctx.stroke();
    }

    function finishSession() {
        startBtn.disabled = false;
        startBtn.style.opacity = "1";
        filterButtons.style.pointerEvents = "auto";
        statusEl.style.display = 'none';
        retakeBtn.style.display = "inline-block";
        downloadBtn.style.display = "inline-block";
    }

    // 5. Download & Retake
    retakeBtn.addEventListener('click', () => startBtn.click());
    
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `Monobooth-${Date.now()}.png`;
        link.href = stripPreview.src;
        link.click();
    });
</script>

</body>
</html>
